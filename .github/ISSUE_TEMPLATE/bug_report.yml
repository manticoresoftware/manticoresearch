name: 🐞 Bug Report
description: Submit a bug report for Manticore Search
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a bug report. We appreciate your effort to provide detailed information.

        ## Before you submit

        - **Existing Manticore Search clients: please create the bug report in your private repository instead of the public issue tracker. Reports there are prioritized so we can start working on them right away.**
        - **Need this bug fixed soon?** Manticore Search provides support subscriptions. If timely resolution is important, please subscribe via [Manticore Search services](https://manticoresearch.com/services/).
        - Public GitHub issues are welcome, but they are triaged according to our public backlog and may not receive immediate attention.

        Please answer the following questions to help us identify and fix the bug.
  - type: textarea
    id: proposal
    attributes:
      label: "Bug Description:"
      description: >
        Describe the bug in detail. Include a [Minimal Reproducible Example](https://en.wikipedia.org/wiki/Minimal_reproducible_example) (MRE) if possible. Place any code blocks within triple backticks:
      value: |
        ```bash
        # Example code block; replace with your code if applicable
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Manticore Search Version:"
      description: >
        Provide the version of Manticore Search you are using. Execute `searchd -v` in the command line to find this information.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: "Operating System Version:"
      description: >
        Specify the version of your operating system.
    validations:
      required: true
  - type: dropdown
    id: dev
    attributes:
      label: "Have you tried the latest development version?"
      multiple: false
      options:
        - "Yes"
        - "No"
  - type: markdown
    attributes:
      value: "## Thank you for completing the form! If timely resolution is important, please use a support subscription: [Manticore Search services](http://manticoresearch.com/services/)."
  - type: textarea
    id: checklist
    attributes:
      label: "Internal Checklist:"
      description: >
        **For Manticore Team Use Only** — Please do not edit this section. This checklist will be completed by the Manticore team as they manage the issue.
      value: |
        <sup>To be completed by the assignee. Check off tasks that have been completed or are not applicable.</sup>
        <details>

        - [ ] Implementation completed
        - [ ] Tests developed
        - [ ] Documentation updated
        - [ ] Documentation reviewed

        </details>
    validations:
      required: true