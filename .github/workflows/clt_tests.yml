name: CLT tests 
on:
  workflow_call:
    inputs:
      docker_image:
        required: true
        type: string
        description: "Docker image to use for tests"
      artifact_name:
        required: false
        type: string
        description: "Name of the docker image artifact"
      repository:
        required: false
        type: string
        description: "Repository to checkout"
      ref:
        required: false
        type: string
        description: "Ref to checkout"
      continue_on_error:
        required: false
        type: boolean
        description: "Continue on error"
        default: false
    secrets:
      OPENAI_API_KEY:
        required: true
        description: "OpenAI API key for CLT tests"
      VOYAGE_API_KEY:
        required: true
        description: "Voyage API key for CLT tests"
      JINA_API_KEY:
        required: true
        description: "Jina API key for CLT tests"

jobs:
  discover:
    name: Discover CLT tests
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - id: build
        name: Build matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib

          openai_key = os.environ.get("OPENAI_API_KEY", "")
          voyage_key = os.environ.get("VOYAGE_API_KEY", "")
          jina_key = os.environ.get("JINA_API_KEY", "")
          have_remote_embedding_keys = all([openai_key, voyage_key, jina_key])

          roots = [
              "test/clt-tests/buddy",
              "test/clt-tests/buddy-plugins",
              "test/clt-tests/bugs",
              "test/clt-tests/core",
              "test/clt-tests/data-manipulation",
              "test/clt-tests/expected-errors",
              "test/clt-tests/fulltext-search",
              "test/clt-tests/mcl",
              "test/clt-tests/http-interface",
              "test/clt-tests/indexer",
              "test/clt-tests/join",
              "test/clt-tests/kibana",
              "test/clt-tests/mysqldump/mysql",
              "test/clt-tests/mysqldump/maria",
              "test/clt-tests/performance",
              "test/clt-tests/replication",
              "test/clt-tests/sharding/cluster",
              "test/clt-tests/sharding/functional",
              "test/clt-tests/sharding/replication",
              "test/clt-tests/sharding/syntax",
              "test/clt-tests/sharding/rollback",
              "test/clt-tests/sharding/regression",
              "test/clt-tests/sharding/table",
              "test/clt-tests/sharding/drop",
              "test/clt-tests/test-configuration",
              "test/clt-tests/vector-knn",
          ]

          tests = []
          for root in roots:
              root_path = pathlib.Path(root)
              if not root_path.exists():
                  continue
              for path in sorted(root_path.glob("*.rec")):
                  content = path.read_text(encoding="utf-8")
                  if not have_remote_embedding_keys and "API_KEY='" in content:
                      continue
                  # clt appends "*.rec" to the prefix; strip the suffix to avoid ".rec*.rec"
                  tests.append(str(path.with_suffix("")))

          total_jobs = 20
          if not tests:
              matrix = {"chunk": []}
          else:
              size = (len(tests) + total_jobs - 1) // total_jobs
              chunks = []
              for i in range(0, len(tests), size):
                  group = tests[i : i + size]
                  chunks.append(
                      {
                          "id": len(chunks),
                          "tests": group,
                          "test_prefix": "\n".join(group),
                      }
                  )
              matrix = {"chunk": chunks}

          print(f"Found {len(tests)} .rec tests across {len(matrix['chunk'])} jobs")
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
          PY

  clt:
    name: CLT
    needs: [discover]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    continue-on-error: ${{ inputs.continue_on_error }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      # Reuse the embedding-model cache from a previous run if one exists. It is bind-mounted
      # at /var/lib/manticore/.cache, where Manticore caches downloaded HuggingFace models.
      # After the tests, whatever the chunk downloaded is saved for the next run.
      # NOTE: this makes .cache a mountpoint, so tests must never `rm -rf /var/lib/manticore`
      # itself — wipe its contents instead (`rm -rf /var/lib/manticore/*` leaves .cache alone).
      - id: model_cache
        name: Restore model cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/clt-model-cache
          key: clt-models-v1-chunk-${{ matrix.chunk.id }}

      - name: Ensure model cache dir
        shell: bash
        run: mkdir -p "${{ runner.temp }}/clt-model-cache" && chmod 777 "${{ runner.temp }}/clt-model-cache"

      - uses: manticoresoftware/clt@0.7.8
        with:
          artifact: ${{ inputs.artifact_name }}
          image: ${{ inputs.docker_image }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          test_prefix: ${{ matrix.chunk.test_prefix }}
          comment_mode: failures
          run_args: "-e OPENAI_API_KEY -e VOYAGE_API_KEY -e JINA_API_KEY -v ${{ runner.temp }}/clt-model-cache:/var/lib/manticore/.cache"
          ui_host: "https://clt.manticoresearch.com"

      # Containers write model blobs as root with mode 600; make them readable so the
      # runner user can pack them into the cache.
      - name: Fix model cache permissions
        if: ${{ always() && steps.model_cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: sudo chmod -R a+rX "${{ runner.temp }}/clt-model-cache" || true

      - name: Save model cache
        if: ${{ always() && steps.model_cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/clt-model-cache
          key: clt-models-v1-chunk-${{ matrix.chunk.id }}
