  # When only CLT changed and a cached image exists, build jobs are skipped. A job that needs
  # build_linux_release would then be skipped too (GitHub skips dependents of skipped jobs),
  # so we use a separate reuse-only job that only needs meta. That way CLT always runs when
  # run_clt is true and we have a test-kit image (either built or reused).
  test_kit_docker_reuse:
    name: Test Kit docker image (reuse cache)
    needs: [meta]
    if: needs.meta.outputs.run_image_build == 'true' && needs.meta.outputs.image_exists == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository # We have to checkout to access .github/workflows/ in further steps
        uses: actions/checkout@v3
        with:
          submodules: recursive
          token: ${{ secrets.MCL_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Reuse cached test kit image
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ needs.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${REPO_OWNER}/manticoresearch:${IMAGE_TAG}"
          docker pull "$IMAGE"
          docker tag "$IMAGE" test-kit:img
          docker create --name manticore-test-kit-src --entrypoint /bin/sh test-kit:img -c "true"
          docker export manticore-test-kit-src > manticore_test_kit.img
          docker rm manticore-test-kit-src
      - name: Pack docker image artifact
        run: tar -cf artifact.tar manticore_test_kit.img
      - name: Upload docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: manticore_test_kit.img
          path: artifact.tar

  test_kit_docker_build:
    name: Test Kit docker image
    needs:
      - build_linux_release
      - mcl_cached_package_jammy
      - mcl_package_jammy
      - mcl_test_package_cache_probe
      - meta
    if: always() && needs.meta.outputs.run_image_build == 'true' && needs.meta.outputs.image_exists != 'true'
    runs-on: ubuntu-22.04
    outputs:
      out-build: ${{ steps.build.outputs.build_image }}
    steps:
      - name: Checkout repository # We have to checkout to access .github/workflows/ in further steps
        uses: actions/checkout@v3
        with:
          submodules: recursive
          token: ${{ secrets.MCL_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Download built x86_64 Ubuntu Jammy packages
        uses: manticoresoftware/download_artifact_with_retries@v3
        with:
          name: release_build
          path: .
      - name: Restore exact-SHA MCL package cache
        if: ${{ needs.mcl_test_package_cache_probe.outputs.cache_hit == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: ./.mcl-package-cache
          key: ${{ needs.mcl_test_package_cache_probe.outputs.cache_key }}

      - name: Download local MCL package artifact (best effort)
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: mcl_package_jammy_x86_64
          path: ./mcl-package
      # Uncomment this shortcut for debug to save time by not preparing the packages in the pack_jammy job
      # - run: |
      #     wget http://dev2.manticoresearch.com/build_jammy_RelWithDebInfo_x86_64.zip
      #     unzip build_jammy_RelWithDebInfo_x86_64.zip
      #     tar -xvf artifact.tar
      - name: Calculate short commit hash
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Building docker
        id: build
        run: |
          BUILD_COMMIT=${{ steps.sha.outputs.sha_short }} /bin/bash dist/test_kit_docker_build.sh
          echo "build_image=ghcr.io/$REPO_OWNER/manticoresearch:test-kit-${{ steps.sha.outputs.sha_short }}" >> $GITHUB_OUTPUT
      - name: Pack docker image artifact
        run: tar -cf artifact.tar manticore_test_kit.img
      - name: Upload docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: manticore_test_kit.img
          path: artifact.tar

  clt:
    if: always() && needs.meta.outputs.run_clt == 'true' && (needs.test_kit_docker_build.result == 'success' || needs.test_kit_docker_reuse.result == 'success')
    name: CLT
    needs: [test_kit_docker_build, test_kit_docker_reuse, meta]
    uses: ./.github/workflows/clt_tests.yml
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
    with:
      docker_image: ghcr.io/${{ github.repository_owner }}/manticoresearch:test-kit-${{ needs.meta.outputs.branch_tag }}
      artifact_name: manticore_test_kit.img
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}

  test_kit_docker_push:
    if: always() && needs.meta.outputs.run_image_push == 'true' && (needs.test_kit_docker_build.result == 'success' || needs.test_kit_docker_reuse.result == 'success')
    needs:
      - clt
      - meta
      - test_kit_docker_build
      - test_kit_docker_reuse
      - test_linux_debug_plain
      - test_linux_debug_rt
      - test_linux_debug_mcl
      - test_linux_release_plain
      - test_linux_release_rt
      - test_linux_release_mcl
      - test_windows_plain
      - test_windows_rt
      - test_windows_mcl
    name: Push Test Kit docker image to repo
    runs-on: ubuntu-22.04
    env:
      GHCR_USER: ${{ vars.GHCR_USER || github.actor }}
      GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD || github.token }}
      REPO_OWNER: ${{ github.repository_owner }}
      SOURCE_HASH: ${{ needs.meta.outputs.source_hash }}
      BRANCH_TAG: ${{ needs.meta.outputs.branch_tag }}
      HASH_TAG_OK: ${{ needs.meta.outputs.source_hash != '' }}
      IMAGE_BUILD_COMMIT: ${{ github.sha }}
    steps:
      - name: Checkout repository # We have to checkout to access .github/workflows/ in further steps
        uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: manticore_test_kit.img
          path: .
      - name: Unpack docker image artifact
        run: |
          if [[ -f artifact.tar ]]; then
            tar -xf artifact.tar
          fi
      - name: Calculate short commit hash
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Pushing docker image to repo
        id: test-kit-push
        run: |
          TEST_RESULT=${{ needs.clt.result }} BUILD_COMMIT=${{ steps.sha.outputs.sha_short }} /bin/bash dist/test_kit_docker_push.sh

  build_aarch64:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Linux aarch64 build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    # Use -VV instead of -V below for more verbose output
    with:
      arch: aarch64
      cmake_command: |
        mkdir build
        cd build
        export CMAKE_TOOLCHAIN_FILE=$(pwd)/../dist/build_dockers/cross/linux.cmake
        export MCL_LOCAL_RUNTIME=OFF
        ctest -V -S ../misc/ctest/justbuild.cmake -DCTEST_SOURCE_DIRECTORY=.. --no-compress-output
      cache_key: build_jammy_aarch64

  build_freebsd:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: FreeBSD x86_64 build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    with:
      DISTR: freebsd13
      boost_url_key: none
      cmake_command: |
        mkdir build
        cd build
        export CMAKE_TOOLCHAIN_FILE=$(pwd)/../dist/build_dockers/cross/freebsd.cmake
        export MCL_LOCAL_RUNTIME=OFF
        ctest -VV -S ../misc/ctest/justbuild.cmake -DCTEST_SOURCE_DIRECTORY=.. --no-compress-output
      cache_key: build_freebsd_x86_64

  build_windows:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Windows x64 build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    with:
      DISTR: windows
      arch: x64
      sysroot_url_key: roots_mysql83_jan17
      boost_url_key: boost_80
      CTEST_CMAKE_GENERATOR: "Ninja Multi-Config"
      CTEST_CONFIGURATION_TYPE: Debug
      cache_key: build_windows_x64
      artifact_list: "build/xml build/src/Debug/indexer.exe build/src/Debug/indexer.pdb build/src/Debug/searchd.exe build/src/Debug/searchd.pdb build/src/gtests/Debug/gmanticoretest.exe build/src/gtests/Debug/gmanticoretest.pdb build/src/Debug/*.dll build/src/gtests/Debug/*.dll build/config/*.c build/config/*.h"
      cmake_command: |
        export MCL_LOCAL_RUNTIME=OFF
        ctest -VV -S misc/ctest/gltest.cmake --no-compress-output

  test_windows_plain:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_windows.result == 'success' && (needs.mcl_runtime_windows_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_windows_debug.result == 'success')
    name: Windows tests (plain)
    needs: [build_windows, mcl_runtime_windows_debug_cached, mcl_runtime_windows_debug, win_bundle, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/win_test_template.yml
    secrets: inherit
    with:
      CTEST_START: 1
      CTEST_END: 999999
      artifact_name: windows_test_results_plain
      results_name: "Windows plain test results"
      suite_name: plain
      CTEST_REGEX: "^test_"
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_windows_debug_x64

  test_windows_rt:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_windows.result == 'success' && (needs.mcl_runtime_windows_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_windows_debug.result == 'success')
    name: Windows tests (rt)
    needs: [build_windows, mcl_runtime_windows_debug_cached, mcl_runtime_windows_debug, win_bundle, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/win_test_template.yml
    secrets: inherit
    with:
      CTEST_START: 1
      CTEST_END: 999999
      artifact_name: windows_test_results_rt
      results_name: "Windows RT test results"
      suite_name: rt
      CTEST_REGEX: "^rt_"
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_windows_debug_x64

  test_windows_mcl:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_windows.result == 'success' && (needs.mcl_runtime_windows_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_windows_debug.result == 'success')
    name: Windows tests (MCL)
    needs: [build_windows, mcl_runtime_windows_debug_cached, mcl_runtime_windows_debug, win_bundle, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/win_test_template.yml
    secrets: inherit
    with:
      CTEST_START: 1
      CTEST_END: 999999
      artifact_name: windows_test_results_mcl
      results_name: "Windows MCL test results"
      suite_name: mcl
      CTEST_REGEX: "^(col|secondary)_"
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_windows_debug_x64

  final_status:
    name: Final status
    needs:
      - build_linux_debug
      - mcl_runtime_linux_debug_cached
      - mcl_runtime_linux_debug
      - test_linux_debug_plain
      - test_linux_debug_rt
      - test_linux_debug_mcl
      - build_linux_release
      - build_linux_release_tests
      - mcl_runtime_linux_release_cached
      - mcl_runtime_linux_release
      - test_linux_release_plain
      - test_linux_release_rt
      - test_linux_release_mcl
      - mcl_runtime_windows_debug_cached
      - mcl_runtime_windows_debug
      - build_windows
      - test_windows_plain
      - test_windows_rt
      - test_windows_mcl
      - build_freebsd
      - build_aarch64
      - clt
      - meta
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Fail if any required job failed
        run: |
          set -euo pipefail
          failed=0
          results=(
            "build_linux_debug:${{ needs.build_linux_debug.result }}"
            "mcl_runtime_linux_debug_cached:${{ needs.mcl_runtime_linux_debug_cached.result }}"
            "mcl_runtime_linux_debug:${{ needs.mcl_runtime_linux_debug.result }}"
            "test_linux_debug_plain:${{ needs.test_linux_debug_plain.result }}:${{ needs.test_linux_debug_plain.outputs.test_outcome }}"
            "test_linux_debug_rt:${{ needs.test_linux_debug_rt.result }}:${{ needs.test_linux_debug_rt.outputs.test_outcome }}"
            "test_linux_debug_mcl:${{ needs.test_linux_debug_mcl.result }}:${{ needs.test_linux_debug_mcl.outputs.test_outcome }}"
            "build_linux_release:${{ needs.build_linux_release.result }}"
            "build_linux_release_tests:${{ needs.build_linux_release_tests.result }}"
            "mcl_runtime_linux_release_cached:${{ needs.mcl_runtime_linux_release_cached.result }}"
            "mcl_runtime_linux_release:${{ needs.mcl_runtime_linux_release.result }}"
            "test_linux_release_plain:${{ needs.test_linux_release_plain.result }}:${{ needs.test_linux_release_plain.outputs.test_outcome }}"
            "test_linux_release_rt:${{ needs.test_linux_release_rt.result }}:${{ needs.test_linux_release_rt.outputs.test_outcome }}"
            "test_linux_release_mcl:${{ needs.test_linux_release_mcl.result }}:${{ needs.test_linux_release_mcl.outputs.test_outcome }}"
            "mcl_runtime_windows_debug_cached:${{ needs.mcl_runtime_windows_debug_cached.result }}"
            "mcl_runtime_windows_debug:${{ needs.mcl_runtime_windows_debug.result }}"
            "build_windows:${{ needs.build_windows.result }}"
            "test_windows_plain:${{ needs.test_windows_plain.result }}:${{ needs.test_windows_plain.outputs.test_outcome }}"
            "test_windows_rt:${{ needs.test_windows_rt.result }}:${{ needs.test_windows_rt.outputs.test_outcome }}"
            "test_windows_mcl:${{ needs.test_windows_mcl.result }}:${{ needs.test_windows_mcl.outputs.test_outcome }}"
            "build_freebsd:${{ needs.build_freebsd.result }}"
            "build_aarch64:${{ needs.build_aarch64.result }}"
          )
          runtime_results=(
            "mcl_runtime_linux_debug:${{ needs.mcl_runtime_linux_debug_cached.outputs.cache_hit }}:${{ needs.mcl_runtime_linux_debug.result }}"
            "mcl_runtime_linux_release:${{ needs.mcl_runtime_linux_release_cached.outputs.cache_hit }}:${{ needs.mcl_runtime_linux_release.result }}"
            "mcl_runtime_windows_debug:${{ needs.mcl_runtime_windows_debug_cached.outputs.cache_hit }}:${{ needs.mcl_runtime_windows_debug.result }}"
          )
          {
            echo "### Final status"
            for entry in "${results[@]}"; do
              name="${entry%%:*}"
              rest="${entry#*:}"
              result="${rest%%:*}"
              outcome="${rest#*:}"
              if [[ "$name" == test_* ]]; then
                if [[ "$outcome" != "$result" && -n "$outcome" ]]; then
                  echo "* $name: $result (ctest: $outcome)"
                else
                  echo "* $name: $result"
                fi
              else
                echo "* $name: $result"
              fi
            done
            if [[ "${{ needs.meta.outputs.run_clt }}" == "true" ]]; then
              echo "* clt: ${{ needs.clt.result }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          for entry in "${results[@]}"; do
            name="${entry%%:*}"
            rest="${entry#*:}"
            result="${rest%%:*}"
            outcome="${rest#*:}"
            if [[ "$name" == test_* && "$result" == "success" && "$outcome" == "failure" ]]; then
              echo "$name: ctest failed"
              failed=1
              continue
            fi
            if [[ "$result" == "failure" || "$result" == "cancelled" || "$result" == "abandoned" || "$result" == "timed_out" || "$result" == "action_required" || "$result" == "startup_failure" ]]; then
              echo "$name: $result"
              failed=1
            fi
          done
          if [[ "${{ needs.meta.outputs.run_clt }}" == "true" ]]; then
            result="${{ needs.clt.result }}"
            if [[ "$result" == "failure" || "$result" == "cancelled" || "$result" == "abandoned" || "$result" == "timed_out" || "$result" == "action_required" || "$result" == "startup_failure" ]]; then
              echo "clt: $result"
              failed=1
            fi
          fi
          if [[ "${{ needs.meta.outputs.run_builds }}" == "true" ]]; then
            for entry in "${runtime_results[@]}"; do
              name="${entry%%:*}"
              rest="${entry#*:}"
              cache_hit="${rest%%:*}"
              build_result="${rest#*:}"
              if [[ "$cache_hit" != "true" && "$build_result" != "success" ]]; then
                echo "$name: no cached runtime artifact and build result was $build_result"
                failed=1
              fi
            done
          else
            echo "* MCL runtime artifacts: skipped (build/ubertest jobs disabled by gate)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$failed" -ne 0 ]]; then
            echo "* Overall: failure" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more build/test jobs failed"
            exit 1
          fi
          echo "* Overall: success" >> "$GITHUB_STEP_SUMMARY"
