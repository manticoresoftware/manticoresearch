name: 🔬 Test
run-name: 🔬 Test ${{ github.sha }}

#on: workflow_call

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - manticore-*
    paths-ignore:
      - 'manual/**'
      - '!manual/References.md'
      - '.translation-cache/**'
      - 'cmake/GetGALERA.cmake'
      - 'galera_packaging/**'
  pull_request:
    branches: [ main, update-buddy-version ]
    paths-ignore:
      - 'manual/**'
      - '!manual/References.md'
      - '.translation-cache/**'
      - 'cmake/GetGALERA.cmake'
      - 'galera_packaging/**'
    types: [opened, synchronize, reopened, labeled, unlabeled]

# cancels the previous workflow run when a new one appears in the same branch (e.g. main or a PR's branch)
concurrency:
  group: test_${{ github.ref }}
  cancel-in-progress: true

# Note: Many build jobs skip execution for PRs targeting 'update-buddy-version' branch
# as these PRs only update dependency versions and don't require full builds/tests
jobs:
  meta:
    name: Meta
    runs-on: ubuntu-22.04
    outputs:
      branch_name: ${{ steps.branch_info.outputs.branch_name }}
      mcl_sha: ${{ steps.mcl_sha.outputs.mcl_sha }}
      mcl_full_sha: ${{ steps.mcl_sha.outputs.mcl_full_sha }}
      mcl_changed: ${{ steps.mcl_detect.outputs.mcl }}
      mcl_test_pkg_cache_key: ${{ steps.mcl_cache_keys.outputs.test_pkg_cache_key }}
      mcl_runtime_linux_release_cache_key: ${{ steps.mcl_cache_keys.outputs.linux_release_cache_key }}
      mcl_runtime_linux_debug_cache_key: ${{ steps.mcl_cache_keys.outputs.linux_debug_cache_key }}
      mcl_runtime_windows_debug_cache_key: ${{ steps.mcl_cache_keys.outputs.windows_debug_cache_key }}
      branch_tag: ${{ steps.sanitize_branch.outputs.branch_tag }}
      source_hash: ${{ steps.source_hash.outputs.source_hash }}
      image_exists: ${{ steps.image_check.outputs.image_exists }}
      image_tag: ${{ steps.image_check.outputs.image_tag }}
      image_commit: ${{ steps.image_check.outputs.image_commit }}
      image_source_hash: ${{ steps.image_check.outputs.image_source_hash }}
      source: ${{ steps.detect.outputs.source }}
      test: ${{ steps.detect.outputs.test }}
      clt: ${{ steps.detect.outputs.clt }}
      changes_detected: ${{ steps.calc.outputs.changes_detected }} # any relevant change (source/test/clt)
      skip_builds: ${{ steps.calc.outputs.skip_builds }} # only CLT tests changed and cached test-kit image exists
      run_builds: ${{ steps.calc.outputs.run_builds }} # build/ubertest jobs
      run_image_build: ${{ steps.calc.outputs.run_image_build }} # build test-kit image
      run_clt: ${{ steps.calc.outputs.run_clt }} # run CLT workflow
      run_image_push: ${{ steps.calc.outputs.run_image_push }} # push test-kit image tags
      skip_clt_reason: ${{ steps.related_prs.outputs.skip_clt_reason }} # explanation for CLT skip
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.MCL_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Commit info
        run: |
          echo "# Automated Tests of commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "* Commit URL: [${{ github.sha }}](/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "* Initiated by: [@${{ github.actor }}](https://github.com/${{ github.actor }})" >> $GITHUB_STEP_SUMMARY
          echo "* Ref: ${{ github.ref_type }} \"${{ github.ref_name }}\"" >> $GITHUB_STEP_SUMMARY
          echo "* Attempt: ${{ github.run_attempt }}" >> $GITHUB_STEP_SUMMARY
      - name: Resolve branch info
        id: branch_info
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
      - name: Sanitize branch name for tags
        id: sanitize_branch
        run: |
          sanitize_tag() {
            local name=$1
            name=$(echo "$name" | tr '/' '_')
            name=$(echo "$name" | sed 's/[^a-zA-Z0-9_.-]//g')
            echo "$name"
          }
          branch_name="${{ steps.branch_info.outputs.branch_name }}"
          branch_tag=$(sanitize_tag "$branch_name")
          echo "branch_tag=$branch_tag" >> $GITHUB_OUTPUT
      - name: Calculate source hash
        id: source_hash
        run: |
          set -euo pipefail
          HASH=$(find . -type f ! -path "./test/clt-tests/*" ! -path "*/.git/*" ! -name .git -print0 | sort -z | xargs -0 md5sum | md5sum | awk '{print $1}')
          echo "source_hash=$HASH" >> $GITHUB_OUTPUT

      - name: Resolve MCL submodule SHA
        id: mcl_sha
        run: |
          set -euo pipefail
          echo "mcl_sha=$(git -C mcl rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT
          echo "mcl_full_sha=$(git -C mcl rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Resolve MCL cache keys
        if: ${{ steps.mcl_sha.outputs.mcl_full_sha != '' }}
        id: mcl_cache_keys
        run: |
          echo "test_pkg_cache_key=mcl-test-pkg-jammy-amd64-${{ steps.mcl_sha.outputs.mcl_full_sha }}" >> "$GITHUB_OUTPUT"
          echo "linux_release_cache_key=mcl-runtime-linux-relwithdebinfo-x86_64-v1-${{ steps.mcl_sha.outputs.mcl_full_sha }}" >> "$GITHUB_OUTPUT"
          echo "linux_debug_cache_key=mcl-runtime-linux-debug-x86_64-v1-${{ steps.mcl_sha.outputs.mcl_full_sha }}" >> "$GITHUB_OUTPUT"
          echo "windows_debug_cache_key=mcl-runtime-windows-debug-x64-v2-${{ steps.mcl_sha.outputs.mcl_full_sha }}" >> "$GITHUB_OUTPUT"
      - name: Check for existing test kit image
        id: image_check
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          TAG="test-kit-${{ steps.sanitize_branch.outputs.branch_tag }}-${{ steps.source_hash.outputs.source_hash }}"
          if docker manifest inspect "ghcr.io/${REPO_OWNER}/manticoresearch:${TAG}" > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "* Reusing cached test-kit image tag: ${TAG}." >> $GITHUB_STEP_SUMMARY
            docker pull "ghcr.io/${REPO_OWNER}/manticoresearch:${TAG}" > /dev/null
            image_commit=$(docker inspect -f '{{ index .Config.Labels "org.manticore.testkit.commit" }}' "ghcr.io/${REPO_OWNER}/manticoresearch:${TAG}" || true)
            image_source_hash=$(docker inspect -f '{{ index .Config.Labels "org.manticore.testkit.source_hash" }}' "ghcr.io/${REPO_OWNER}/manticoresearch:${TAG}" || true)
            echo "image_commit=${image_commit}" >> $GITHUB_OUTPUT
            echo "image_source_hash=${image_source_hash}" >> $GITHUB_OUTPUT
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "image_commit=" >> $GITHUB_OUTPUT
            echo "image_source_hash=" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
      - name: Detect changed files and categories
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          head="${{ github.sha }}"
          base=""
          if [[ -n "${{ steps.image_check.outputs.image_commit }}" ]]; then
            base="${{ steps.image_check.outputs.image_commit }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          files=""
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            files=$(git ls-tree -r --name-only "$head")
          else
            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$base"
            fi
            files=$(git diff --name-only "$base" "$head")
          fi

          {
            echo "### Changed files"
            echo "* Base: ${base:-'(none)'}"
            echo "* Head: ${head}"
            if [[ -n "${{ steps.image_check.outputs.image_commit }}" ]]; then
              echo "* Using image commit as base"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -z "$files" && "$base" == "$head" ]]; then
            echo "* No diff (base == head); forcing full run" >> "$GITHUB_STEP_SUMMARY"
            files="__force_all__"
          fi
          if [[ -n "$files" ]]; then
            echo "$files" | sed 's/^/* /' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "* (no files)" >> "$GITHUB_STEP_SUMMARY"
          fi

          files_list_path="$RUNNER_TEMP/changed-files.txt"
          printf '%s\n' "$files" > "$files_list_path"

          python3 - "$files_list_path" <<'PY'
          import os
          import sys

          with open(sys.argv[1], encoding="utf-8") as fh:
              files = [line.rstrip("\n") for line in fh]
          source = False
          test = False
          clt = False
          for path in files:
              if not path:
                  continue
              if path == "__force_all__":
                  source = True
              elif path.startswith("test/clt-tests/"):
                  clt = True
              elif path.startswith("test/"):
                  test = True
              elif path.startswith("manual/") or path.startswith("doc/"):
                  pass
              else:
                  source = True
          output = os.environ["GITHUB_OUTPUT"]
          with open(output, "a", encoding="utf-8") as fh:
              fh.write(f"source={'true' if source else 'false'}\n")
              fh.write(f"test={'true' if test else 'false'}\n")
              fh.write(f"clt={'true' if clt else 'false'}\n")
          PY
      - name: Finalize MCL detection
        id: mcl_detect
        shell: bash
        run: |
          set -euo pipefail
          mcl_needed=false
          base=""
          head="${{ github.sha }}"
          if [[ -n "${{ steps.image_check.outputs.image_commit }}" ]]; then
            base="${{ steps.image_check.outputs.image_commit }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          files=""
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            files=$(git ls-tree -r --name-only "$head")
          else
            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$base"
            fi
            files=$(git diff --name-only "$base" "$head")
          fi

          if printf '%s\n' "$files" | grep -Eq '^(mcl(/|$)|\.gitmodules$)'; then
            mcl_needed=true
          fi
          if [[ "${{ steps.mcl_sha.outputs.mcl_sha }}" != "" ]]             && ! bash dist/resolve_repo_artifact.sh --repo-type dev --distr jammy --arch amd64 --sha "${{ steps.mcl_sha.outputs.mcl_sha }}" --extension .deb >/dev/null 2>&1; then
            mcl_needed=true
          fi
          echo "mcl=$mcl_needed" >> "$GITHUB_OUTPUT"

      - name: Check related PRs for branch
        id: related_prs
        run: |
          set -euo pipefail
          reason=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            for repo in manticoresearch-buddy; do
              response="$( (curl -sSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository_owner }}/$repo/pulls?state=open&head=${{ github.repository_owner }}:${{ github.event.pull_request.head.ref }}&per_page=1" || true) | tr -d '[:space:]')"
              if [[ "$response" != "[]" && "$response" != "" ]]; then
                reason+="$repo: open PR for ${{ github.repository_owner }}:${{ github.event.pull_request.head.ref }} | "
              fi
            done

            reason="${reason%% | }"
          fi
          echo "skip_clt_reason=$reason" >> "$GITHUB_OUTPUT"
      - name: Calculate gating
        id: calc
        run: |
          set -euo pipefail
          changes_detected=false
          if [[ "${{ steps.detect.outputs.source }}" == "true"              || "${{ steps.detect.outputs.test }}" == "true"              || "${{ steps.detect.outputs.clt }}" == "true" ]]; then
            changes_detected=true
          fi

          skip_builds=false
          if [[ "${{ steps.detect.outputs.clt }}" == "true"              && "${{ steps.detect.outputs.source }}" != "true"              && "${{ steps.detect.outputs.test }}" != "true"              && "${{ steps.image_check.outputs.image_exists }}" == "true" ]]; then
            skip_builds=true
          fi

          run_builds=false
          if [[ "$changes_detected" == "true"              && "${{ github.event_name }}" == "pull_request"              && "${{ github.event.pull_request.base.ref }}" == "update-buddy-version" ]]; then
            run_builds=false
          elif [[ "$changes_detected" == "true" && "$skip_builds" == "false" ]]; then
            run_builds=true
          fi

          run_image_build="$changes_detected"
          run_clt="$changes_detected"
          skip_clt_tag=false
          if git tag --points-at HEAD | grep -qx "skip_clt"; then
            skip_clt_tag=true
            run_clt=false
          fi
          run_image_push=false
          if [[ "$changes_detected" == "true" && "${{ steps.image_check.outputs.image_exists }}" != "true" ]]; then
            run_image_push=true
          fi

          echo "changes_detected=$changes_detected" >> "$GITHUB_OUTPUT"
          echo "skip_builds=$skip_builds" >> "$GITHUB_OUTPUT"
          echo "run_builds=$run_builds" >> "$GITHUB_OUTPUT"
          echo "run_image_build=$run_image_build" >> "$GITHUB_OUTPUT"
          echo "run_clt=$run_clt" >> "$GITHUB_OUTPUT"
          echo "run_image_push=$run_image_push" >> "$GITHUB_OUTPUT"
          echo "skip_clt_tag=$skip_clt_tag" >> "$GITHUB_OUTPUT"
      - name: Summarize gating
        run: |
          {
            echo "### Gate decisions"
            echo "* Changes detected (source/test/CLT): ${{ steps.calc.outputs.changes_detected }}"
            echo "* Skip builds/ubertests (only CLT changes + cached image): ${{ steps.calc.outputs.skip_builds }}"
            echo "* Run build/ubertest jobs: ${{ steps.calc.outputs.run_builds }}"
            echo "* Build test-kit image: ${{ steps.calc.outputs.run_image_build }}"
            echo "* Run CLT tests: ${{ steps.calc.outputs.run_clt }}"
            echo "* Push test-kit image tags: ${{ steps.calc.outputs.run_image_push }}"
            if [[ "${{ steps.calc.outputs.skip_clt_tag }}" == "true" ]]; then
              echo "* CLT skip reason: skip_clt tag on commit"
            fi
            if [[ -n "${{ steps.related_prs.outputs.skip_clt_reason }}" ]]; then
              echo "* CLT skip reason: ${{ steps.related_prs.outputs.skip_clt_reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  win_bundle:
    # Skip build jobs for PRs targeting 'update-buddy-version' branch (buddy version updates don't need full builds)
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Windows supplementary files preparation
    runs-on: ubuntu-22.04
    steps:
      - name: Check out cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            bundle
            boost_1_75_0
          enableCrossOsArchive: true
          key: win_bundle
      - name: Extract Windows bundle from Windows sysroot
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget https://repo.manticoresearch.com/repository/sysroots/roots_apr15/sysroot_windows_x64.tar.xz
          tar -xvf sysroot_windows_x64.tar.xz
          mv diskc/winbundle bundle
      - name: Extract Boost to put it to the cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget https://repo.manticoresearch.com/repository/ci/boost_1_75_0.tgz
          tar -xf boost_1_75_0.tgz
      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_bundle
          path: |
            bundle
            boost_1_75_0

  build_linux_debug:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Linux debug build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    with:
      CTEST_CONFIGURATION_TYPE: "Debug"
      artifact_name: debug_build
      cache_key: build_linux_debug_x86_64
      cmake_command: |
        export CMAKE_TOOLCHAIN_FILE=$(pwd)/dist/build_dockers/cross/linux.cmake
        export MCL_LOCAL_RUNTIME=OFF
        ctest -VV -S misc/ctest/gltest.cmake --no-compress-output

  test_linux_debug_plain:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_linux_debug.result == 'success' && (needs.mcl_runtime_linux_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_linux_debug.result == 'success')
    name: Linux debug mode tests (plain)
    needs: [build_linux_debug, mcl_runtime_linux_debug_cached, mcl_runtime_linux_debug, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/test_template.yml
    secrets: inherit
    with:
      build_artifact_name: debug_build
      artifact_name: debug_test_results_plain
      results_name: "Linux debug plain test results"
      suite_name: plain
      CTEST_REGEX: "^test_"
      timeout: 20
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_linux_debug_x86_64

  test_linux_debug_rt:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_linux_debug.result == 'success' && (needs.mcl_runtime_linux_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_linux_debug.result == 'success')
    name: Linux debug mode tests (rt)
    needs: [build_linux_debug, mcl_runtime_linux_debug_cached, mcl_runtime_linux_debug, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/test_template.yml
    secrets: inherit
    with:
      build_artifact_name: debug_build
      artifact_name: debug_test_results_rt
      results_name: "Linux debug RT test results"
      suite_name: rt
      CTEST_REGEX: "^rt_"
      timeout: 20
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_linux_debug_x86_64

  test_linux_debug_mcl:
    if: always() && (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'update-buddy-version') != true && needs.build_linux_debug.result == 'success' && (needs.mcl_runtime_linux_debug_cached.outputs.cache_hit == 'true' || needs.mcl_runtime_linux_debug.result == 'success')
    name: Linux debug mode tests (MCL)
    needs: [build_linux_debug, mcl_runtime_linux_debug_cached, mcl_runtime_linux_debug, meta]
    permissions:
      checks: write
      contents: read
    uses: ./.github/workflows/test_template.yml
    secrets: inherit
    with:
      build_artifact_name: debug_build
      artifact_name: debug_test_results_mcl
      results_name: "Linux debug MCL test results"
      suite_name: mcl
      CTEST_REGEX: "^(col|secondary)_"
      timeout: 20
      MCL_RUNTIME_ARTIFACT_NAME: mcl_runtime_linux_debug_x86_64

  build_linux_release:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Linux release build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    with:
      artifact_name: release_build
      cache_key: build_linux_release_x86_64
      artifact_list: "build/xml build/CMakeFiles/CMake*.log build/api/libsphinxclient/testcli build/src/indexer build/src/indextool build/src/searchd build/src/tests build/src/gtests/gmanticoretest build/config/*.c build/config/*.h build/**/*.cxx build/**/*.gcno build/manticore*deb"
      cmake_command: |
        export CMAKE_TOOLCHAIN_FILE=$(pwd)/dist/build_dockers/cross/linux.cmake
        export PACK=1
        export PACK_KEEP_TESTS=1
        ctest -VV -S misc/ctest/gltest.cmake --no-compress-output
        cmake --build build --target package

  build_linux_release_tests:
    if: needs.meta.outputs.run_builds == 'true'
    needs: [meta]
    name: Linux release test build
    uses: ./.github/workflows/build_template.yml
    secrets: inherit
    with:
      artifact_name: release_test_build
      cache_key: build_linux_release_tests_x86_64
      cmake_command: |
        export CMAKE_TOOLCHAIN_FILE=$(pwd)/dist/build_dockers/cross/linux.cmake
        export MCL_LOCAL_RUNTIME=OFF
        ctest -VV -S misc/ctest/gltest.cmake --no-compress-output

  mcl_test_package_cache_probe:
    name: MCL test package cache probe
    needs: [meta]
    runs-on: ubuntu-22.04
    container:
      image: manticoresearch/external_toolchain:clang16_cmake3263
    outputs:
      cache_key: ${{ steps.meta.outputs.cache_key }}
      cache_hit: ${{ steps.meta.outputs.cache_hit }}
    steps:
      - name: Prepare probe path
        run: mkdir -p .mcl-package-cache
      - name: Restore exact-SHA MCL package cache
        id: probe
        if: ${{ needs.meta.outputs.mcl_full_sha != '' }}
        uses: actions/cache/restore@v4
        with:
          path: .mcl-package-cache
          key: mcl-test-pkg-jammy-amd64-${{ needs.meta.outputs.mcl_full_sha }}
      - name: Validate restored MCL package cache
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          if find .mcl-package-cache -maxdepth 2 -type f -name 'manticore-columnar-lib_*_amd64.deb' | grep -q .; then
            echo "cache_payload_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_payload_ok=false" >> "$GITHUB_OUTPUT"
            echo "Cached MCL package payload missing; treating cache as miss"
            find .mcl-package-cache -maxdepth 4 -type f | sort || true
          fi
      - name: Export cache probe metadata
        id: meta
        run: |
          echo "cache_key=mcl-test-pkg-jammy-amd64-${{ needs.meta.outputs.mcl_full_sha }}" >> "$GITHUB_OUTPUT"
          echo "cache_hit=${{ steps.probe.outputs['cache-hit'] == 'true' && steps.validate.outputs.cache_payload_ok == 'true' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"

  mcl_cached_package_jammy:
    name: MCL jammy cached package
    needs: [meta, mcl_test_package_cache_probe]
    if: needs.mcl_test_package_cache_probe.outputs.cache_hit == 'true'
    runs-on: ubuntu-22.04
    container:
      image: manticoresearch/external_toolchain:clang16_cmake3263
    steps:
      - name: Restore exact-SHA MCL package cache
        uses: actions/cache/restore@v4
        with:
          path: .mcl-package-cache
          key: ${{ needs.mcl_test_package_cache_probe.outputs.cache_key }}
      - name: Prepare cached MCL package artifact
        shell: bash
        run: |
          set -euo pipefail
          find .mcl-package-cache -maxdepth 1 -type f | sort
          rm -rf mcl-package
          mkdir -p mcl-package
          find .mcl-package-cache -maxdepth 1 -type f -name 'manticore-columnar-lib*' -exec cp {} mcl-package/ \;
          find mcl-package -maxdepth 1 -type f | sort
          if ! find mcl-package -maxdepth 1 -type f -name 'manticore-columnar-lib_*_amd64.deb' | grep -q .; then
            echo 'No manticore-columnar-lib package found to publish from exact-SHA cache' >&2
            exit 1
          fi
      - name: Upload cached MCL package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcl_package_jammy_x86_64
          path: mcl-package
          if-no-files-found: error

  mcl_runtime_linux_release_cached:
    name: MCL runtime Linux release cached
    needs: [meta]
    if: always() && needs.meta.outputs.run_builds == 'true'
    runs-on: ubuntu-22.04
    container:
      image: manticoresearch/external_toolchain:vcpkg331_20260310
    outputs:
      cache_hit: ${{ steps.validate.outputs.cache_hit }}
    steps:
      - name: Prepare cache path
        run: mkdir -p .mcl-runtime-cache
      - name: Restore exact MCL Linux Release runtime cache
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: .mcl-runtime-cache
          key: ${{ needs.meta.outputs.mcl_runtime_linux_release_cache_key }}
      - name: Validate MCL Linux Release runtime cache
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          ok=true
          if [[ "${{ steps.restore.outputs['cache-hit'] }}" != "true" ]]; then
            ok=false
          fi
          for lib in lib_manticore_columnar.so lib_manticore_secondary.so lib_manticore_knn.so lib_manticore_knn_embeddings.so; do
            if [[ ! -f ".mcl-runtime-cache/${lib}" ]]; then
              ok=false
            fi
          done
          if [[ "${ok}" == "true" ]]; then
            rm -rf mcl-runtime
            mkdir -p mcl-runtime
            cp .mcl-runtime-cache/* mcl-runtime/
            find mcl-runtime -maxdepth 1 -type f | sort
          else
            echo "MCL Linux Release runtime cache miss or incomplete"
            find .mcl-runtime-cache -maxdepth 1 -type f | sort || true
          fi
          echo "cache_hit=${ok}" >> "$GITHUB_OUTPUT"
      - name: Upload cached MCL Linux Release runtime artifact
        if: steps.validate.outputs.cache_hit == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mcl_runtime_linux_release_x86_64
          path: mcl-runtime
          if-no-files-found: error

