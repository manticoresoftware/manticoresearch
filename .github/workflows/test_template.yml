name: Test Template

on:
  workflow_call:
    inputs:
      WITH_COVERAGE:
        required: false
        type: number
        default: 0
      CTEST_START:
        required: false
        type: number
        default: 1
      CTEST_END:
        required: false
        type: number
        default: 999999
      CTEST_EXCLUDE_REGEX:
        required: false
        type: string
        default: ""
      CTEST_REGEX:
        required: false
        type: string
        default: ""
      suite_name:
        required: false
        type: string
        default: ""
      UNITY_BUILD:
        required: false
        type: number
        default: 1
      FLOAT_TOLERANCE:
        required: false
        type: boolean
        default: false
      artifact_name:
        required: true
        type: string
      build_artifact_name:
        required: true
        type: string
      results_name:
        required: true
        type: string
      timeout:
        required: false
        type: number
        default: 60
      xml_command:
        required: false
        type: string
        default: "cd build; cp -r Testing/2*/Test.xml .; xsltproc -o junit_tests.xml ../misc/junit/ctest2junit.xsl Test.xml"
      MCL_PACKAGE_ARTIFACT_NAME:
        required: false
        type: string
        default: ""
      MCL_PACKAGE_SHA:
        required: false
        type: string
        default: ""
      MCL_PACKAGE_CACHE_KEY:
        required: false
        type: string
        default: ""
      MCL_REPO_TYPE:
        required: false
        type: string
        default: "dev"
      MCL_RUNTIME_ARTIFACT_NAME:
        required: false
        type: string
        default: ""
    outputs:
      test_outcome:
        description: Outcome of the test step (success/failure)
        value: ${{ jobs.test.outputs.test_outcome }}

jobs:
  test:
    name: ${{ inputs.suite_name || format('{0}_{1}', inputs.CTEST_START, inputs.CTEST_END) }}
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ inputs.timeout }}
    continue-on-error: true
    outputs:
      test_outcome: ${{ steps.test.outcome }}
    defaults:
      run:
        shell: bash
    container:
      image: manticoresearch/ubertests_public:332_aot
      env:
        DIAGNOSTIC: 1
        CACHEB: ../cache
        NO_BUILD: 1
        CTEST_START: ${{ inputs.CTEST_START }}
        CTEST_END: ${{ inputs.CTEST_END }}
        CTEST_REGEX: ${{ inputs.CTEST_REGEX }}
        CTEST_EXCLUDE_REGEX: ${{ inputs.CTEST_EXCLUDE_REGEX }}
        # The following is useful to test a specific test, just uncomment it, no need to disable CTEST_START/END
        # CTEST_REGEX: test_234
        WITH_COVERAGE: ${{ inputs.WITH_COVERAGE }}
        LIBS_BUNDLE:
        UNITY_BUILD: ${{ inputs.UNITY_BUILD }}
        FLOAT_TOLERANCE: ${{ inputs.FLOAT_TOLERANCE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          token: ${{ secrets.MCL_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Tests container entrypoint
        run: bash /entry_point.sh &

      - name: Setup lemmatizer config
        run: |
          mkdir -p "$HOME"
          cp /root/.sphinx "$HOME/.sphinx"
          test -f /work/aot/de.pak
          test -f /work/aot/en.pak
          test -f /work/aot/ru.pak
          test -f /work/aot/uk.pak

      - name: Check out cache before building
        uses: actions/cache@v4
        with:
          path: cache
          enableCrossOsArchive: true
          key: build_linux_debug_x86_64

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build_artifact_name }}
          path: build

      - name: Restore build artifact executable permissions
        run: |
          for exe in \
            build/api/libsphinxclient/testcli \
            build/src/indexer \
            build/src/indextool \
            build/src/searchd \
            build/src/tests \
            build/src/gtests/gmanticoretest
          do
            if [[ -f "$exe" ]]; then
              chmod +x "$exe"
            fi
          done

      - name: Download MCL runtime artifact
        if: ${{ inputs.MCL_RUNTIME_ARTIFACT_NAME != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.MCL_RUNTIME_ARTIFACT_NAME }}
          path: ./mcl-runtime

      - name: Preflight MCL runtime artifact
        if: ${{ inputs.MCL_RUNTIME_ARTIFACT_NAME != '' }}
        run: |
          set -euo pipefail
          if [[ -f ./mcl-runtime/artifact.tar ]]; then
            tar -xf ./mcl-runtime/artifact.tar -C ./mcl-runtime
          fi
          required=(
            lib_manticore_columnar.so
            lib_manticore_secondary.so
            lib_manticore_knn.so
            lib_manticore_knn_embeddings.so
          )
          for lib in "${required[@]}"; do
            if [[ ! -f "./mcl-runtime/${lib}" ]]; then
              echo "Missing MCL runtime library: ${lib}" >&2
              find ./mcl-runtime -maxdepth 3 -type f | sort || true
              exit 1
            fi
          done
          echo "MCL_RUNTIME_ARTIFACT_DIR=$(pwd)/mcl-runtime" >> "$GITHUB_ENV"
          echo "BUILD_EMBEDDINGS_LOCALLY=OFF" >> "$GITHUB_ENV"
          find ./mcl-runtime -maxdepth 1 -type f | sort

      - name: Download built MCL package artifact (best effort)
        if: ${{ inputs.MCL_PACKAGE_ARTIFACT_NAME != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.MCL_PACKAGE_ARTIFACT_NAME }}
          path: ./.mcl-package-cache

      - name: Install manticore-columnar-lib
        if: ${{ inputs.MCL_PACKAGE_ARTIFACT_NAME != '' || inputs.MCL_PACKAGE_CACHE_KEY != '' || inputs.MCL_PACKAGE_SHA != '' }}
        run: |
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive
          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.ubuntu.com/ubuntu jammy main
          deb http://archive.ubuntu.com/ubuntu jammy-updates main
          deb http://security.ubuntu.com/ubuntu jammy-security main
          EOF
          rm -f /etc/apt/sources.list.d/*
          apt-get -o Acquire::Retries=3 update || apt-get -o Acquire::Retries=3 update
          apt-get -y remove 'manticore-repo' || true
          apt-get -o Acquire::Retries=3 -y install wget curl
          curl -fsSL https://repo.manticoresearch.com/manticore-repo.noarch.deb -o /tmp/manticore-repo.noarch.deb
          dpkg -i /tmp/manticore-repo.noarch.deb

          if [[ -f ./.mcl-package-cache/artifact.tar ]]; then
            tar -xf ./.mcl-package-cache/artifact.tar -C ./.mcl-package-cache
          fi
          pkg=$(find ./.mcl-package-cache -type f -name 'manticore-columnar-lib_*_amd64.deb' | head -n 1)
          if [[ -n "$pkg" ]]; then
            echo "Installing $pkg"
            dpkg -i "$pkg"
            exit 0
          fi

          if [[ -n "${{ inputs.MCL_PACKAGE_ARTIFACT_NAME }}" || -n "${{ inputs.MCL_PACKAGE_CACHE_KEY }}" ]]; then
            echo 'built/cached MCL package not found'; find ./.mcl-package-cache -maxdepth 4 -type f | sort || true
          fi

          PACKAGE_URL=$(bash dist/resolve_repo_artifact.sh --repo-type "${{ inputs.MCL_REPO_TYPE }}" --distr jammy --arch amd64 --sha "${{ inputs.MCL_PACKAGE_SHA }}" --extension .deb)
          echo "Installing ${PACKAGE_URL}"
          curl -fsSL "${PACKAGE_URL}" -o /tmp/manticore-columnar-lib.deb
          dpkg -i /tmp/manticore-columnar-lib.deb

      - name: List files
        run: find .

      - name: 🚀 Test
        id: test
        # --timeout may be not working https://gitlab.kitware.com/cmake/cmake/-/issues/23979
        # use -VV instead of -V to get more verbose output
        run: |
          ctest -V -S misc/ctest/gltest.cmake --no-compress-output --timeout 600
        continue-on-error: true

      - name: Check test results
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "❌ Tests failed ❌"
            exit 1
          fi
          
      - name: List build files
        if: always()
        run: find build
        continue-on-error: true

      - name: Prepare test report xmls
        if: always()
        continue-on-error: true
        run: ${{ inputs.xml_command }}

      - name: Upload test artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            build/xml
            build/junit*.xml
            build/status*
            build/Testing/Temporary/*
            build/test/error*.txt
            build/test/*log
            build/test/test_*/report*
            build/test/rt_*/report*
            build/test/col_*/report*

      - name: Publish test results
        if: always() && github.repository_owner == 'manticoresoftware'
        continue-on-error: true
        uses: manticoresoftware/publish-unit-test-result-action@v2
        with:
          check_name: ${{ inputs.results_name }}
          files: build/junit*.xml
          compare_to_earlier_commit: false
          comment_mode: failures
  
